<div
  class="flex items-center gap-2 py-1 border-b border-(--text)/10 cursor-pointer {{
    todo().isActive ? 'border-l-4 border-l-green-700' : 'border-l-4 border-l-red-400 bg-red-400/10'
  }}"
  role="button"
  tabindex="0"
  (click)="toggleSelect()"
  (keydown.enter)="toggleSelect()"
>
  <mat-checkbox [checked]="todo().isSelected" />
  <span class="text-(--text) truncate">{{ todo().description }}</span>

  <!-- actions -->
  <div class="flex items-center justify-between ml-auto gap-8">
    @if (todo().isActive) {
      <button class="grid! place-items-center!" matIconButton (click)="onDone($event)">
        <mat-icon>check</mat-icon>
      </button>
    } @else {
      <mat-icon>done_all</mat-icon>
    }
    <button
      class="grid! place-items-center!"
      matIconButton
      [matMenuTriggerFor]="menu"
      (click)="$event.stopPropagation()"
    >
      <span class="material-icons-outlined">delete</span>
    </button>
    <mat-menu #menu="matMenu">
      <button class="flex gap-2 menu-item-warn" mat-menu-item (click)="onDelete($event)">
        <span class="material-icons-outlined" matMenuItemIcon>delete</span>
        <span>Delete</span>
      </button>
    </mat-menu>
  </div>
</div>
