<section class="container mb-8">
  <app-main-title title="Analyze your text in real-time." />

  <mat-form-field class="w-full" appearance="outline">
    <textarea
      matInput
      placeholder="Start typing here... (or paste your text)"
      rows="5"
      [(ngModel)]="text"
      (input)="onInput($event)"
    ></textarea>
  </mat-form-field>

  <!-- Letter Density -->

  <h2 class="text-2xl font-bold mb-4">Letter Density</h2>

  @if (enteredChars().length) {
    <article class="flex flex-col gap-2">
      @for (char of enteredChars(); track $index) {
        <div class="max-w-full flex items-center justify-between gap-4">
          <span> {{ char.char | uppercase }}</span>
          <mat-progress-bar mode="determinate" value="{{ char.percenter }}"></mat-progress-bar>
          <div class="flex items-center justify-between gap-2">
            <span>{{ char.count }}</span>
            <span>({{ char.percenter | number: '1.2-2' }}%)</span>
          </div>
        </div>
      }
    </article>
  } @else {
    <p class="text-(--text)/80">No characters found Start typing to see letter density.</p>
  }
</section>
