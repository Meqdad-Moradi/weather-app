<section class="container mb-8">
  <app-main-title title="Job Listing" />

  @if (isLoading()) {
    <mat-progress-spinner class="mx-auto mt-4" diameter="36" mode="indeterminate" />
  } @else {
    <article class="flex flex-col">
      @for (job of filteredJobListings(); track job.id) {
        <app-job-list-item [job]="job" />
      } @empty {
        <span>No Job found...</span>
      }
    </article>
  }
</section>
