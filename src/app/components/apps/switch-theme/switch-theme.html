<button
  class="theme-toggle"
  (click)="toggleTheme()"
  [attr.aria-label]="'Switch to ' + (theme() === 'light' ? 'dark' : 'light') + ' theme'"
>
  @if (theme() === 'light') {
    <span class="icon">☀️</span>
    <span class="label">Light</span>
  } @else {
    <span class="icon">🌙</span>
    <span class="label">Dark</span>
  }
</button>
